<script>
// =====================
// CONFIG
// =====================

// Set your Discord webhook (or leave empty "")
const DISCORD_WEBHOOK = "";

// Default admin (created on first run)
const DEFAULT_ADMIN = {
  email: "craig.blippy@fireandemergencyaotearoa.co.nz",
  password: "CBliptin0A",
  role: "admin"
};

// =====================
// STATE
// =====================

let users = [];
let events = {};
let units = {};
let status = {};
let selectedEvent = null;
let currentUser = null;
let discordThreads = {}; // eventId -> threadId

// =====================
// STORAGE
// =====================

function save(){
  localStorage.setItem("CAD_DATA", JSON.stringify({
    users, events, units, status, discordThreads
  }));
}

function load(){
  const d = JSON.parse(localStorage.getItem("CAD_DATA") || "{}");
  users = d.users || [];
  if(users.length === 0){
    users.push(DEFAULT_ADMIN);
    save();
  }
  events = d.events || {};
  units = d.units || {};
  status = d.status || {};
  discordThreads = d.discordThreads || {};
}

// =====================
// DISCORD
// =====================

const COLORS = {alert:15158332,success:5763719,info:3447003,warning:15844367};

async function sendCAD({eventId=null,title,description,color="info"}){
  if(!DISCORD_WEBHOOK) return;

  const payload = {
    embeds:[{
      title, description, color: COLORS[color],
      footer:{text:"CAD System"},
      timestamp: new Date().toISOString()
    }]
  };

  if(eventId){
    let threadId = discordThreads[eventId];

    if(!threadId){
      payload.thread_name = "🚨 Incident " + eventId;
      const res = await fetch(DISCORD_WEBHOOK,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
      });
      try{
        const data = await res.json();
        discordThreads[eventId] = data.id;
        save();
      }catch{}
      return;
    }

    fetch(DISCORD_WEBHOOK + "?thread_id=" + threadId,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });

  }else{
    fetch(DISCORD_WEBHOOK,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
  }
}

// =====================
// LOGIN
// =====================

function login(){
  const e = email.value.trim();
  const p = password.value.trim();

  const u = users.find(x => x.email === e && x.password === p);

  if(u){
    currentUser = u;
    loginPanel.style.display = "none";
    app.style.display = "block";

    if(u.role === "admin"){
      adminPanel.style.display = "block";
      renderUsers();
    }

    renderAll();
    sendCAD({title:"✅ Login",description:e,color:"success"});
  }else{
    loginStatus.innerText = "Invalid login";
    sendCAD({title:"❌ Failed Login",description:e,color:"alert"});
  }
}

// =====================
// ADMIN
// =====================

function addUser(){
  const e = newUserEmail.value.trim();
  const p = newUserPass.value.trim();
  if(!e || !p) return;

  users.push({email:e,password:p,role:"user"});
  save();
  renderUsers();

  sendCAD({title:"👑 User Created",description:e,color:"warning"});
}

function removeUser(){
  const e = removeUserEmail.value.trim();
  users = users.filter(u => u.email !== e);
  save();
  renderUsers();

  sendCAD({title:"👑 User Removed",description:e,color:"warning"});
}

function renderUsers(){
  userList.innerHTML = "";
  users.forEach(u=>{
    const d = document.createElement("div");
    d.textContent = u.email + " (" + (u.role||"user") + ")";
    userList.appendChild(d);
  });
}

// =====================
// INCIDENTS
// =====================

function createEvent(){
  const id = Date.now();

  events[id] = {
    id,
    type: incType.value,
    loc: location.value,
    units: [],
    log: [],
    alert: true
  };

  selectedEvent = events[id];
  save();
  renderAll();

  sendCAD({
    eventId:id,
    title:"🚨 New Incident",
    description:`${incType.value} @ ${location.value}`,
    color:"alert"
  });
}

function logComcen(){
  if(!selectedEvent) return;

  const msg = "COMCENCOM: " + comcenMsg.value;
  selectedEvent.log.push(msg);
  save();
  renderLog();

  sendCAD({
    eventId:selectedEvent.id,
    title:"📞 COMCEN",
    description:msg
  });

  comcenMsg.value="";
}

function assignUnitFunc(){
  if(!selectedEvent) return;

  const u = assignUnit.value;
  if(!selectedEvent.units.includes(u)){
    selectedEvent.units.push(u);
    save();
    renderAll();

    sendCAD({
      eventId:selectedEvent.id,
      title:"🚒 Unit Assigned",
      description:u
    });
  }
}

function closeIncident(){
  if(!selectedEvent) return;
  const res = closeResult.value;
  if(!res) return;

  selectedEvent.log.push("CLOSED: " + res);
  selectedEvent.alert = false;
  save();
  renderAll();

  sendCAD({
    eventId:selectedEvent.id,
    title:"🧾 Incident Closed",
    description:res,
    color:"success"
  });
}

// =====================
// K-CODES
// =====================

function applyKCode(){
  const u = kCallsign.value.trim();
  const k = kDropdown.value;
  const loc = k6Location.value.trim();

  if(!u || !k) return;

  let s = k;
  if(k.startsWith("K6") && loc){
    s += " @ " + loc;
  }

  status[u] = s;

  if(!units[u]) units[u] = true;

  if(selectedEvent){
    selectedEvent.log.push(u + " → " + s);
  }

  save();
  renderUnits();
  renderLog();

  sendCAD({
    eventId:selectedEvent?.id,
    title:"📍 Status Update",
    description:`${u} → ${s}`
  });

  kCallsign.value="";
  kDropdown.value="";
  k6Location.value="";
}

// =====================
// DOWNLOAD
// =====================

function downloadIncident(){
  if(!selectedEvent) return;

  const txt =
    "EVENT " + selectedEvent.id + "\n" +
    selectedEvent.type + "\n" +
    selectedEvent.loc + "\n\n" +
    (selectedEvent.log||[]).join("\n");

  const blob = new Blob([txt]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "incident_" + selectedEvent.id + ".txt";
  a.click();
}

// =====================
// UI
// =====================

function renderAll(){
  renderEvents();
  renderUnits();
  updateAssign();
  renderLog();
}

function renderEvents(){
  eventsTable.innerHTML =
    "<tr><th>ID</th><th>Type</th><th>Location</th><th>Units</th></tr>";

  Object.values(events).forEach(e=>{
    const r = document.createElement("tr");
    if(e.alert) r.classList.add("alert");

    r.innerHTML =
      `<td>${e.id}</td><td>${e.type}</td><td>${e.loc}</td><td>${(e.units||[]).join(",")}</td>`;

    r.onclick = ()=>{
      selectedEvent = e;
      e.alert = false;
      save();
      renderLog();
    };

    eventsTable.appendChild(r);
  });
}

function renderUnits(){
  unitList.innerHTML = "";
  Object.keys(units).forEach(u=>{
    const d = document.createElement("div");
    const s = status[u] || "K0";

    const cls = s.split(":")[0].toLowerCase();
    d.className = "unit " + cls;

    d.textContent = `${u} — ${s}`;
    d.onclick = ()=>{ kCallsign.value = u; };

    unitList.appendChild(d);
  });
}

function renderLog(){
  log.innerHTML = "";
  if(!selectedEvent) return;

  (selectedEvent.log||[]).forEach(l=>{
    const d = document.createElement("div");
    d.textContent = l;
    log.appendChild(d);
  });
}

function updateAssign(){
  assignUnit.innerHTML = "";
  Object.keys(units).forEach(u=>{
    const o = document.createElement("option");
    o.value = u;
    o.textContent = u;
    assignUnit.appendChild(o);
  });
}

// =====================
// INIT
// =====================

load();
</script>

</body>
